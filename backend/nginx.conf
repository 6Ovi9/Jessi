resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # PostgREST API — rewrite /rest/v1/* to /*
    location /rest/v1/ {
        set $upstream_rest rest:3000;
        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass http://$upstream_rest;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GoTrue Auth API
    location /auth/v1/ {
        set $upstream_auth auth:9999;
        rewrite ^/auth/v1/(.*)$ /$1 break;
        proxy_pass http://$upstream_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Realtime WebSocket
    location /realtime/v1/ {
        set $upstream_realtime realtime:4000;
        proxy_pass http://$upstream_realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Health check
    location /health {
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # Root — friendly info page
    location = / {
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"Couples Watch API Gateway","endpoints":["/rest/v1/","/auth/v1/","/realtime/v1/","/health"]}';
    }
}
